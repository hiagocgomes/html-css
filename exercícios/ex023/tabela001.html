<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            background-image: linear-gradient(to right, white, rgb(0, 0, 0));
        }
        h1{
            text-align: center;
            background-image: linear-gradient(to top right, white, rgb(0, 0, 0));
            width: 400px;
            margin: auto;
        }

        table{
            width: 400px;
            border-collapse: collapse;
        }

        td.a1{
            background-color: darkgray;
        }
        td.a2{
            background-color: yellow;
        }
        td.time{
            background-color: rgb(65, 194, 30);
            
            
        }

        td{
            border: 1px solid black;
            padding: 8px;
            text-align: center;
        }
     
        table#cor{
            border: 5px solid red;
            background-image: linear-gradient(to left, green, rgb(197, 245, 208));
        }


        #table03{
            width: 400px;
            height: 400px;
            border-collapse: collapse;
        }


        
    </style>
</head>
<body>
    <h1>Minha primeira tabela</h1>
    <table>
        <tr>
            <td class="a1">A1</td>
            <td class="a2">B1</td>
            <td class="a1">C1</td>
        </tr>
        <tr>
            <td class="a2">A2</td>
            <td class="a1">B2</td>
            <td class="a2">C2</td>
        </tr>
        <tr>
            <td class="a1">A3</td>
            <td class="a2">B3</td>
            <td class="a1">C3</td>
        </tr>
        <tr>
            <td class="a2">A4</td>
            <td class="a1">B4</td>
            <td class="a2">C4</td>
        </tr>
    </table>
    <br>

    <table class="time" id="cor">
        <tr>
            <th>TIMES</th>
            
        </tr>
        <tr>
            <td>Corinthians</td>
            <td class="">P 12</td>
            <td class="">J 4</td>
            <td>GP 40</td>
            <td>GC 2</td>
            <td>SG 38</td>
        </tr>
        <tr>
            <td>Palmeiras</td>
            <td class="">P 0</td>
            <td class="">J 4</td>
            <td>GP 3</td>
            <td>GC 20</td>
            <td>SG -17</td>
        </tr>
        <tr>
            <td>São Paulo</td>
            <td class="">P 2</td>
            <td class="">J 4</td>
            <td>GP 5</td>
            <td>GC 10</td>
            <td>SG -5</td>
        </tr>
        <tr>
            <td>Santos</td>
            <td class="">P 1</td>
            <td class="">J 4</td>
            <td>GP 8</td>
            <td>GC 10</td>
            <td>SG -2</td>
        </tr>
    </table>
    <br>

    <table id="table03">
        <tr>
            <td>A1</td>
            <td>B1</td>
            <td>C1</td>
        </tr>
        <tr>
            <td>A2</td>
            <td>B2</td>
            <td>C2</td>
        </tr>
        <tr>
            <td>A3</td>

            <td>C3</td>
        </tr>
        <tr>
            <td>A4</td>

            <td>C4</td>
        </tr>
    </table>
    
</body>
</html>
